version: '3.9'

# Staging compose: uses pre-built GHCR images (set API_IMAGE, WORKER_IMAGE, WEB_IMAGE before running)
# Ports: web=4000, api=4001
# Run with: docker compose -p ai-3d-staging -f docker-compose.staging.yml --env-file .env.images up -d

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    image: ${API_IMAGE}
    restart: unless-stopped
    ports:
      - '4001:3001'
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=staging
    env_file:
      - .env
    volumes:
      - storage_staging:/app/apps/api/storage
    depends_on:
      redis:
        condition: service_healthy

  worker:
    image: ${WORKER_IMAGE}
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - NODE_ENV=staging
    env_file:
      - .env
    volumes:
      - storage_staging:/api/storage
    depends_on:
      redis:
        condition: service_healthy

  web:
    image: ${WEB_IMAGE}
    restart: unless-stopped
    ports:
      - '4000:3000'
    environment:
      - NODE_ENV=staging
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:4001}
    depends_on:
      - api

volumes:
  storage_staging:
